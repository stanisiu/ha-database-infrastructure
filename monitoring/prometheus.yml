global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "monitor-node"
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: "db-servers"
    static_configs:
      - targets:
          - "10.10.50.10:9100"
          - "10.10.50.11:9100"